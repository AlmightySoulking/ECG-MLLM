model:
  arch: minigpt4
  model_type: pretrain_vicuna0
  max_txt_len: 160
  end_sym: '###'
  prompt_path: prompts/alignment.txt
  prompt_template: '###Human: {} ###Assistant: '
  ckpt: ''
  ecg_model: ecg_vit
  seq_len: 1000
  patch_size:
  - 1
  - 200
datasets:
  cc_sbu_align:
    batch_size: 6
    ecg_processor:
      train:
        name: base_processor
    text_processor:
      train:
        name: blip_caption
run:
  task: ecg_text_pretrain
  lr_sched: linear_warmup_cosine_lr
  init_lr: 3e-5
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05
  max_epoch: 5
  iters_per_epoch: 200
  num_workers: 4
  warmup_steps: 200
  seed: 42
  output_dir: ''
  amp: true
  resume_ckpt_path: null
  evaluate: false
  train_splits:
  - train
  device: cuda
  world_size: 1
  dist_url: env://
  distributed: true
  wandb_log: true
  job_name: minigpt4_finetune
